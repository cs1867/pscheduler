name: pscheduler-workflow
  
on:
  workflow_dispatch: 
    inputs: 
      OS:
        description: 'OS to build'
        required: true
      BUILD_VARS_JSON:
        description: 'Build var json file'
        required: true      
  workflow_run:
    workflows: "Create Artifacts and pass runid"
    branches: 'github-workflow'
    types:
      - completed

jobs:
       
  build-pscheduler:

     runs-on: ubuntu-latest



     steps:
        - name: Check out Repo
          uses: actions/checkout@v4
          with:
            ref: 5.2.0
            
        - name: Create a temporary artifact downloads folder
          run: |
            mkdir /home/runner/work/pscheduler/pscheduler/artifacts
          
        - name: Pretty-print BUILD_VARS_JSON
          run: |
            echo '${{ github.event.inputs.BUILD_VARS_JSON }}'
            
        - name: Extract dependencies
          id: extract_deps
          run: |
            echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq -r '.repos[] | select(.name == "${{ github.event.repository.name }}") | .deps[]' > deps.txt
            echo "Dependencies:"
            cat deps.txt
            
        - name: Set dependencies as outputs
          id: set_deps
          run: |
            echo "cat deps.txt"
            cat deps.txt
            
        - name: Download artifacts
          run: |
            mkdir -p artifacts
            while IFS= read -r repo; do
              echo "Downloading artifact for $repo"
              run_id=$(echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq -r ".buildids | .[\"$repo\"]")
              echo "rund id $run_id"
              gh run download $run_id --repo cs1867/$repo -D artifacts/$repo --name "$repo-${{ github.event.inputs.OS }}"
            done < deps.txt
          env:
            GITHUB_TOKEN: ${{ secrets.GIT_ACTIONS }}

        - name: list dirs
          run: |  
            ls -al  artifacts/$repo
            ls  -al artifacts/$repo/RPMS
      
          
